# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
default_language_version:
  python: python3.11
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
        exclude: ^tests/auxiliary/.*
      - id: check-yaml
      - id: check-json
      - id: pretty-format-json
        args: [--autofix, --no-sort-keys]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.20
    hooks:
      # Run the linter.
      - id: ruff-check
        args: [--fix]
      # Run the formatter.
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: "v2.1.0"
    hooks:
      - id: mypy
        # List type stub dependencies explicitly, as --install-types should be avoided as per
        # https://github.com/pre-commit/mirrors-mypy/blob/main/README.md
        additional_dependencies:
          - types-python-dateutil==2.9.0.20260518
          - typing-extensions==4.15.0
          - types-jsonschema==4.26.0.20260518
          - cyclonedx-python-lib==11.11.0
          - univers==32.0.1
          - charset-normalizer==3.4.7
          - natsort==8.4.0
          - docstring-parser==0.18.0
          - email-validator==2.3.0
        files: "^cdxev/.*\\.py$"
        args: ["--config-file", "pyproject.toml"]
  - repo: https://github.com/astral-sh/uv-pre-commit
    # uv version.
    rev: 0.11.25
    hooks:
      - id: uv-lock
      - id: uv-export
        name: Sync ClusterFuzzLite requirements.txt from uv.lock
        args:
          - "--frozen"
          - "--no-default-groups"
          - "--no-emit-project"
          - "--output-file=.clusterfuzzlite/requirements.txt"
        files: ^(uv\.lock|pyproject\.toml)$
